name: Daily Football Predict Bot

on:
  schedule:
    # 香港時間每天早上 07:00 運行 (等於 UTC 前一晚 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 容許人手隨時撳掣測試

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run prediction script
      run: python predict.py
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GROK_API_KEY: ${{ secrets.GROK_API_KEY }} # <--- 更換成 Grok 鎖匙
